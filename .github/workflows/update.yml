name: Heti Scopus Frissítés

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Kód letöltése a szerverre
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # A teljes történetet letölti, hogy ne legyen szinkronizációs hiba

      - name: Python telepítése
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Csomagok telepítése
        run: pip install -r requirements.txt

      - name: Weboldal generálása (Szkript futtatása)
        env:
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
        run: python generate.py

      - name: Automatikus mentés és feltöltés
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automatikus heti frissítés 🤖"
          file_pattern: 'index.html'
