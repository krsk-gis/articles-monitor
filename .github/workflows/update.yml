name: Heti Scopus Frissítés

on:
  schedule:
    - cron: '0 8 * * 1' # Minden hétfőn reggel 8:00 (UTC)
  workflow_dispatch: # Ez lehetővé teszi, hogy te is elindítsd gombnyomásra

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Kód letöltése a szerverre
        uses: actions/checkout@v3

      - name: Python telepítése
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Csomagok telepítése
        run: pip install -r requirements.txt

      - name: Weboldal generálása (Szkript futtatása)
        env:
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
        run: python generate.py

      - name: Az új weblap mentése a GitHubra
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Automatikus heti frissítés" || echo "Nincs új változás"
          git push
